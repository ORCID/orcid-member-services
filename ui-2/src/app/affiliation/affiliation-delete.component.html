<form name="deleteForm" (ngSubmit)="confirmDelete(affiliation?.id)">
  <div class="modal-header">
    <h4 class="modal-title" i18n="@@entity.delete.title.string">Confirm deletion</h4>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" (click)="clear()"></button>
  </div>
  <div class="modal-body">
    <app-alert-error />
    @if (!affiliation?.addedToORCID) {
      <p i18n="@@gatewayApp.assertionServiceAssertion.delete.fromPortal.string">
        Are you sure you want to delete this affiliation from the portal?
      </p>
    }
    @if (affiliation?.addedToORCID) {
      <p>
        {{ message() }}
      </p>
    }
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-outline-primary" data-bs-dismiss="modal" (click)="clear()">
      <fa-icon [icon]="faBan" />&nbsp;<span i18n="@@entity.action.cancel.string">Cancel</span>
    </button>
    <button data-cy="confirmDeleteAffiliation" type="submit" class="btn btn-danger">
      <fa-icon [icon]="faTimes" />&nbsp;<span i18n="@@entity.action.delete.string">Delete</span>
    </button>
  </div>
</form>
