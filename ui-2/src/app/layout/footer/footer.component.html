<footer class="footer">
  <div class="container" role="presentation" style="position: relative">
    <div class="row footer-row-container" role="presentation">
      <nav>
        <div class="copyright">
          <a href="https://orcid.org" aria-label="ORCID">
            <img src="./content/images/orcid-logo.svg" width="88" alt="" />
          </a>
          <p>&copy; {{ currentYear }} ORCID, Inc</p>
        </div>
        <ul class="nav navbar-nav list-group list-group-horizontal">
          <li class="list-group-item">
            <a href="https://orcid.org/footer/privacy-policy" i18n="@@footer.privacyPolicy.string">Privacy Policy</a>
          </li>
          <li class="list-group-item">
            <a href="https://orcid.org/content/orcid-terms-use" i18n="@@footer.termsOfUse.string">Terms of Use</a>
          </li>
          @if (isAuthenticated()) {
            <li class="list-group-item">
              <a id="helpLink" href="mailto:membersupport@orcid.org" i18n="@@footer.help.string">Help</a>
            </li>
          }
          <li class="list-group-item">
            <a href="https://orcid.org/signin" i18n="@@footer.orcidRegistry.string">ORCID Registry</a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
  @if (releaseVersion) {
    <div class="release-version">
      {{ releaseVersion | async }}
    </div>
  }
</footer>
