<div class="alerts" role="alert">
  @for (alert of alerts; track alert) {
    <div>
      @if (alert && alert.type && alert.msg) {
        <ngb-alert [type]="'info'" [dismissible]="false" class="alert-success">
          <div class="d-flex">
            <div class="font-size-16 flex-grow-1">{{ alert.msg | localize }}</div>
            <button
              type="button"
              (click)="close(alert)"
              (keyup.esc)="closeOldestAlert()"
              (keyup.enter)="closeOldestAlert()"
              class="btn-close"
              aria-label="Close"
            ></button>
          </div>
        </ngb-alert>
      }
    </div>
  }
</div>
